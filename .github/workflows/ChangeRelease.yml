name: ChangeRelease
on:
  workflow_dispatch: {}
  push:
    paths: [CHANGELOG.md]
    branches: [master]
    tags: ["*"]

permissions:
  contents: write

jobs:
  sync:
    if: github.repository == 'qd-today/qd' || github.repository == 'ymting/qd'
    runs-on: ubuntu-latest
    steps:
    - uses: dropseed/changerelease@v1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        # optional
        tag_prefix: ""
        changelog: CHANGELOG.md
