name: Publish GHCR Image

on:
  push:
    tags:
      - "20*"
  workflow_dispatch:
    inputs:
      version:
        description: Image version tag, for example 20260715.1
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ghcr-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and publish linux/amd64 image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          # 手动重建旧版本时也必须检出对应标签，不能误用 master 的最新源码。
          ref: ${{ inputs.version || github.ref }}

      - name: Resolve image version
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_VERSION: ${{ github.ref_name }}
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${EVENT_NAME}" == "push" ]]; then
            version="${TAG_VERSION}"
          else
            version="${MANUAL_VERSION}"
          fi
          if [[ ! "${version}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker image tag: ${version}" >&2
            exit 1
          fi
          source_sha="$(git rev-parse --short=7 HEAD)"
          echo "value=${version}" >> "${GITHUB_OUTPUT}"
          echo "sha_tag=sha-${source_sha}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.sha_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.value }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ghcr
          platforms: linux/amd64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=ghcr-amd64
          cache-to: type=gha,mode=max,scope=ghcr-amd64

      - name: Verify published version image
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: docker buildx imagetools inspect "${REGISTRY}/${IMAGE_NAME}:${VERSION}"
